<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Recipe — Votre Carnet de Cuisine Artisanal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:ital,wght@0,300;0,400;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Space+Mono&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="header-content">
                <div class="logo">Magic <span>recipe</span></div>
                <nav class="main-nav" aria-label="Navigation principale">
    <ul>
        <li><a href="#creation" class="nav-link active">Nouvelle création</a></li>
        <li><a href="#mes-recettes" class="nav-link">Mes recettes</a></li>
        <li><a href="#catalogues" class="nav-link">Catalogues</a></li>
        <li>
            <a href="guide.html" target="_blank" class="nav-link" style="color: var(--color-cuivre); border: 1px solid var(--color-cuivre); background: transparent;">
                ✨ Guide Magique
            </a>
        </li>
    </ul>
</nav>
            </div>
        </header>

        <main class="main-content">
            
            <section id="creation" class="section-panel">
                <h2 class="section-title">Nouvelle création</h2>
                <div class="creation-grid">
                    <div class="form-side">
                        <form id="generator-form">
                            <div class="form-group">
                                <label for="recipe-title">Nom de l'idée ou Ingrédients dispos</label>
                                <input type="text" id="recipe-title" class="form-control" placeholder="Ex: Restes de poulet, crème fraîche, fond de placard..." required>
                            </div>
                            <div class="form-group">
                                <label for="recipe-envie">De quoi avez-vous envie ?</label>
                                <textarea id="recipe-envie" class="form-control" rows="4" placeholder="Ex: Un plat réconfortant d'hiver, rapide à faire..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Générer la recette magique</button>
                        </form>
                    </div>
                    <div class="info-side" style="display:flex; flex-direction:column; justify-content:center; border-left: 1px dashed rgba(42,58,53,0.2); padding-left: 1.5rem;">
                        <h3 style="font-family: var(--font-display); margin-bottom: 0.5rem;">Laissez opérer la magie</h3>
                        <p style="color: var(--color-text-light); font-size: 1rem;">Notre générateur artisanal va composer une recette sur-mesure basée sur vos envies.</p>
                    </div>
                </div>
            </section>

            <section id="catalogues" class="section-panel">
                <h2 class="section-title">Catalogues</h2>
                
                <nav class="catalog-tabs" aria-label="Catégories de cuisines" id="catalog-filters">
                    <button class="tab-button active" data-origine="toutes">Toutes</button>
                    <button class="tab-button" data-origine="chinoise">Chinoise</button>
                    <button class="tab-button" data-origine="italienne">Italienne</button>
                    <button class="tab-button" data-origine="française">Française</button>
                    <button class="tab-button" data-origine="américaine">Américaine</button>
                    <button class="tab-button" data-origine="fast food">Fast Food</button>
                    <button class="tab-button" data-origine="japonaise">Japonaise</button>
                </nav>

                <div class="recipe-grid" id="catalog-grid"></div>
            </section>

            <section id="mes-recettes" class="section-panel">
                <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5rem; border-bottom: 1px solid var(--color-croute); padding-bottom: 0.5rem;">
                    <h2 class="section-title" style="border:none; margin:0;">Mes recettes préférées</h2>
                    <span id="fav-count" style="font-family: var(--font-ui); font-size: 0.9rem; color: var(--color-cuivre);">0 recette enregistrée</span>
                </div>
                
                <div class="recipe-grid" id="favorites-grid"></div>
            </section>

        </main>
    </div>

    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
